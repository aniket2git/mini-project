{% extends "base.html" %}

{% block content %}

<div class="mt-16">

    <h1 class="text-5xl font-bold mb-10">
        Admin Dashboard
    </h1>

    <div class="bg-white p-8 rounded-2xl shadow-lg">

        <h2 class="text-2xl font-bold">
            Welcome Admin
        </h2>

        <p class="mt-4 text-gray-600">
            Manage courses and platform content here.
        </p>

    </div>
<div class="bg-white p-8 rounded-2xl shadow-lg mt-10">

    <h2 class="text-3xl font-bold mb-6">
        Upload New Course
    </h2>

    <form method="POST" action="/create-course" enctype="multipart/form-data">

        <input
            type="file"
            name="image"
            class="w-full border p-3 rounded-lg mb-4"
        >

        <input
            type="text"
            name="title"
            placeholder="Course Title"
            class="w-full border p-3 rounded-lg mb-4"
        >

        <textarea
            name="description"
            placeholder="Course Description"
            class="w-full border p-3 rounded-lg mb-4"
        ></textarea>

        <input
            type="number"
            name="price"
            placeholder="Price"
            class="w-full border p-3 rounded-lg mb-4"
        >

        <button
            type="submit"
            class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700"
        >
            Create Course
        </button>

    </form>



</div>

<div class="bg-white p-8 rounded-2xl shadow-lg mt-12">

    <h2 class="text-3xl font-bold mb-6">
        Upload Lecture
    </h2>

    <form
        method="POST"
        action="/create-lecture"
        enctype="multipart/form-data"
    >

        <input
            type="text"
            name="title"
            placeholder="Lecture Title"
            class="w-full border p-3 rounded-lg mb-4"
        >

        <input
            type="number"
            name="course_id"
            placeholder="Course ID"
            class="w-full border p-3 rounded-lg mb-4"
        >

        <input
            type="file"
            name="video"
            class="w-full border p-3 rounded-lg mb-4"
        >

        <button
            type="submit"
            class="bg-purple-600 text-white px-6 py-3 rounded-lg"
        >
            Upload Lecture
        </button>

    </form>

</div>
</div>

{% endblock %}
