{% extends "base.html" %}

{% block content %}

<h1 class="text-5xl font-bold mb-10">
    Courses
</h1>

<div class="grid md:grid-cols-3 gap-8">

    {% for course in courses %}

    
    <a href="/course/{{ course.id }}">

        <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-2xl transition">
            {% if course.image %}

            <img
                src="/uploads/course_images/{{ course.image }}"
                class="w-full h-48 object-cover rounded-xl mb-5"
            >

            {% endif %}
            
            <h2 class="text-2xl font-bold">
                {{ course.title }}
            </h2>

            <p class="mt-4 text-gray-600">
                {{ course.description }}
            </p>

            <div class="mt-6 text-3xl font-bold text-blue-600">
                ₹{{ course.price }}
            </div>

        </div>

    </a>

    {% endfor %}

</div>

{% endblock %}
