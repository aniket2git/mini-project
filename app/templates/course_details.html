{% extends "base.html" %}

{% block content %}

<div class="mt-12">

    <h1 class="text-5xl font-bold">
        {{ course.title }}
    </h1>

    <p class="mt-6 text-xl text-gray-600">
        {{ course.description }}
    </p>

    <div class="mt-6 text-3xl font-bold text-blue-600">
        ₹{{ course.price }}
    </div>
    
    <a href="/buy-course/{{ course.id }}"
    class="inline-block mt-8 bg-green-600 text-white px-8 py-4 rounded-xl hover:bg-green-700">

     Buy Course

    </a>

</div>

<hr class="my-12">

<h2 class="text-4xl font-bold mb-8">
    Course Lectures
</h2>

<div class="space-y-6">

    {% for lecture in course.lectures %}

    <div class="bg-white p-6 rounded-2xl shadow-md">

        <h3 class="text-2xl font-bold">
            {{ lecture.title }}
        </h3>

        <a href="/lecture/{{ lecture.id }}"
           class="inline-block mt-4 bg-blue-600 text-white px-5 py-2 rounded-lg">
           Watch Lecture
        </a>

    </div>

    {% endfor %}

</div>

{% endblock %}
